<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Schedule Maker — AY 2025-2026 Term 3</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, -apple-system, sans-serif; background: #f5f5f3; color: #1a1a1a; min-height: 100vh; padding: 1.5rem; }
  h1 { font-size: 18px; font-weight: 600; margin-bottom: 2px; }
  .subtitle { font-size: 13px; color: #888; margin-bottom: 1.25rem; }

  .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 1.25rem; }
  .stat-card { background: #fff; border: 1px solid #e5e5e5; border-radius: 10px; padding: 12px 1rem; text-align: center; }
  .stat-label { font-size: 12px; color: #888; margin-bottom: 3px; }
  .stat-val { font-size: 22px; font-weight: 600; }

  .tabs-area { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; margin-bottom: 1.25rem; }
  .tab { display: inline-flex; align-items: center; gap: 6px; padding: 6px 12px; border-radius: 8px; cursor: pointer; font-size: 13px; border: 1px solid #e5e5e5; background: #fff; transition: all 0.15s; user-select: none; }
  .tab:hover { border-color: #bbb; }
  .tab.active { border-color: #3b82f6; background: #eff6ff; color: #1d4ed8; }
  .tab-badge { font-size: 11px; background: #f0f0ee; padding: 1px 6px; border-radius: 10px; color: #666; }
  .tab.active .tab-badge { background: #dbeafe; color: #1d4ed8; }
  .tab-del { font-size: 16px; line-height: 1; color: #bbb; }
  .tab-del:hover { color: #e74c3c !important; }
  .tab-edit { font-size: 13px; color: #bbb; }
  .tab-edit:hover { color: #3b82f6 !important; }
  .btn-new { display: inline-flex; align-items: center; gap: 4px; padding: 6px 14px; border-radius: 8px; cursor: pointer; font-size: 13px; border: 1px dashed #ccc; background: transparent; color: #888; font-family: inherit; transition: all 0.15s; }
  .btn-new:hover { border-color: #3b82f6; color: #3b82f6; background: #eff6ff; }

  .course-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 1.25rem; }
  .ccard { background: #fff; border-radius: 10px; padding: 12px; transition: border-color 0.15s; }
  .pill { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 4px; margin-bottom: 6px; }
  .sbtn { display: flex; align-items: center; justify-content: space-between; padding: 6px 8px; margin-bottom: 4px; cursor: pointer; border-radius: 6px; font-family: inherit; width: 100%; background: transparent; text-align: left; transition: background 0.1s; }
  .sbtn:hover { background: #f5f5f3; }

  .cal-wrap { background: #fff; border: 1px solid #e5e5e5; border-radius: 10px; overflow: hidden; }
  .cal-hdr { display: flex; background: #fafaf8; border-bottom: 1px solid #e5e5e5; }
  .cal-body { display: flex; }
  .hint { margin-top: 10px; font-size: 11px; color: #aaa; }

  @media (max-width: 600px) {
    .course-grid { grid-template-columns: 1fr; }
    .stats { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<h1>Schedule Maker</h1>
<p class="subtitle">AY 2025-2026 · Term 3 · Manila Campus · Auto-saved to this browser</p>

<div class="tabs-area" id="tabs-area"></div>

<div class="stats">
  <div class="stat-card"><p class="stat-label">total units</p><p class="stat-val" id="s-cr">0</p></div>
  <div class="stat-card"><p class="stat-label">courses added</p><p class="stat-val" id="s-cnt">0 / 7</p></div>
  <div class="stat-card"><p class="stat-label">conflicts</p><p class="stat-val" id="s-conf" style="color:#22a06b;">none</p></div>
</div>

<div class="course-grid" id="cgrid"></div>

<div style="display:flex;gap:10px;align-items:flex-start;">

  <div id="sel-list" style="width:220px;flex-shrink:0;background:#fff;border:1px solid #e5e5e5;border-radius:10px;padding:12px;min-height:120px;">
    <div style="font-size:11px;font-weight:700;color:#aaa;letter-spacing:0.05em;text-transform:uppercase;margin-bottom:10px;">Selected Classes</div>
    <div id="sel-list-body" style="font-size:12px;color:#555;"><span style="color:#ccc;font-size:11px;">Nothing selected yet.</span></div>
  </div>

  <div style="flex:1;min-width:0;">
    <div class="cal-wrap">
      <div class="cal-hdr" id="calhdr"></div>
      <div class="cal-body">
        <div id="taxs" style="width:46px;flex-shrink:0;position:relative;"></div>
        <div id="calb" style="flex:1;display:flex;position:relative;"></div>
      </div>
    </div>
    <p class="hint">Click a section to add it · Click again to remove · Red outline = time conflict · ⚠ = almost full</p>
  </div>

</div>

<script>
// ─── CONSTANTS ───────────────────────────────────────────
const DAYS = ['MON','TUE','WED','THU','FRI','SAT','SUN'];
const DLBL = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
const START = 420, END = 1305, PPM = 0.6;
const H = (END - START) * PPM;
const STORAGE_KEY = 'schedmaker-aye2526t3';

function fmt(m) {
  const h = Math.floor(m / 60), mn = m % 60;
  const hh = h > 12 ? h - 12 : h === 0 ? 12 : h;
  return `${hh}:${mn.toString().padStart(2,'0')} ${h >= 12 ? 'PM' : 'AM'}`;
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ─── COLORS ──────────────────────────────────────────────
const C = [
  {bg:'#E6F1FB',tx:'#185FA5',bd:'#378ADD'},
  {bg:'#E1F5EE',tx:'#0F6E56',bd:'#1D9E75'},
  {bg:'#FAEEDA',tx:'#854F0B',bd:'#BA7517'},
  {bg:'#EAF3DE',tx:'#3B6D11',bd:'#639922'},
  {bg:'#EEEDFE',tx:'#534AB7',bd:'#7F77DD'},
  {bg:'#FAECE7',tx:'#993C1D',bd:'#D85A30'},
  {bg:'#FBEAF0',tx:'#993556',bd:'#D4537E'},
];

// ─── COURSE DATA ─────────────────────────────────────────
const courses = [
  {id:'cpecog1', code:'CPECOG1', name:'CPE Elective 1 Lecture', type:'Lecture', cr:2, ci:0, secs:[
    {id:'E21', prof:'Jay Robert Del Rosario', slots:[{d:'TUE',s:870,e:930},{d:'FRI',s:870,e:930}], en:4,  cap:22},
    {id:'E22', prof:'Jay Robert Del Rosario', slots:[{d:'TUE',s:450,e:510},{d:'FRI',s:450,e:510}], en:2,  cap:22},
    {id:'E20', prof:'Jay Robert Del Rosario', slots:[{d:'TUE',s:555,e:615},{d:'FRI',s:555,e:615}], en:21, cap:22},
  ]},
  {id:'dsigpro', code:'DSIGPRO', name:'Digital Signal Processing', type:'Lecture', cr:3, ci:1, secs:[
    {id:'E32', prof:'Gerald Arada', slots:[{d:'MON',s:870,e:960},{d:'THU',s:870,e:960}],   en:13, cap:30},
    {id:'E31', prof:'Gerald Arada', slots:[{d:'MON',s:975,e:1065},{d:'THU',s:975,e:1065}], en:7,  cap:30},
    {id:'E30', prof:'Gerald Arada', slots:[{d:'MON',s:660,e:750},{d:'THU',s:660,e:750}],   en:14, cap:30},
  ]},
  {id:'ochesaf', code:'OCHESAF', name:'Basic Occ. Health & Safety', type:'Lecture', cr:3, ci:2, secs:[
    {id:'E21', prof:'Antonette Ilahi', slots:[{d:'MON',s:870,e:960},{d:'THU',s:870,e:960}],   en:6,  cap:22},
    {id:'E20', prof:'Antonette Ilahi', slots:[{d:'MON',s:555,e:645},{d:'THU',s:555,e:645}],   en:7,  cap:22},
    {id:'E22', prof:'Antonette Ilahi', slots:[{d:'MON',s:765,e:855},{d:'THU',s:765,e:855}],   en:16, cap:22},
  ]},
  {id:'lbycpf3', code:'LBYCPF3', name:'CPE Elective 1 Laboratory', type:'Lab', cr:1, ci:3, secs:[
    {id:'E25', prof:'Donabel Abuan',  slots:[{d:'MON',s:870,e:1050}], en:12, cap:25},
    {id:'E26', prof:'Leonard Ambata', slots:[{d:'MON',s:570,e:750}],  en:4,  cap:25},
    {id:'E27', prof:'Donabel Abuan',  slots:[{d:'WED',s:570,e:750}],  en:10, cap:25},
  ]},
  {id:'cpeprac', code:'CPEPRAC', name:'CPE Laws & Professional Practice', type:'Lecture', cr:2, ci:4, secs:[
    {id:'E22', prof:'Armie Pakzad', slots:[{d:'TUE',s:870,e:930},{d:'FRI',s:870,e:930}], en:11, cap:22},
    {id:'E20', prof:'Armie Pakzad', slots:[{d:'TUE',s:660,e:720},{d:'FRI',s:660,e:720}], en:7,  cap:22},
    {id:'E21', prof:'Armie Pakzad', slots:[{d:'TUE',s:765,e:825},{d:'FRI',s:765,e:825}], en:10, cap:22},
  ]},
  {id:'lbycpa4', code:'LBYCPA4', name:'DSP Laboratory', type:'Lab', cr:1, ci:5, secs:[
    {id:'E25', prof:'Dino Ligutan',   slots:[{d:'TUE',s:870,e:1050}], en:17, cap:25},
    {id:'E26', prof:'Reggie Gustillo',slots:[{d:'TUE',s:450,e:630}],  en:10, cap:25},
    {id:'E27', prof:'Reggie Gustillo',slots:[{d:'TUE',s:660,e:840}],  en:10, cap:25},
  ]},
  {id:'thscp4a', code:'THSCP4A', name:'CPE Practice and Design 1', type:'Capstone', cr:1, ci:6, secs:[
    {id:'E40', prof:'Ronnel Agulto', slots:[{d:'SAT',s:1080,e:1275}], en:24, cap:40},
    {id:'E41', prof:'Ronnel Agulto', slots:[{d:'SUN',s:600,e:630}],   en:2,  cap:40},
  ]},
];

// ─── STATE ───────────────────────────────────────────────
let state = { active: null, schedules: [] };

function initState() {
  const id = 'sched-' + Date.now();
  state = { active: id, schedules: [{ id, name: 'Schedule 1', sel: {} }] };
}

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      state = JSON.parse(raw);
      if (!Array.isArray(state.schedules) || !state.schedules.length) initState();
      if (!state.schedules.find(s => s.id === state.active)) {
        state.active = state.schedules[0].id;
      }
    } else {
      initState();
    }
  } catch(e) { initState(); }
}

function saveState() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e) {}
}

function getActiveSched() {
  return state.schedules.find(s => s.id === state.active) || state.schedules[0];
}

function getActiveSel() {
  return getActiveSched()?.sel || {};
}

// ─── LOGIC ───────────────────────────────────────────────
function getSlots(sel) {
  const out = [];
  Object.entries(sel).forEach(([cid, sid]) => {
    if (!sid) return;
    const c = courses.find(x => x.id === cid);
    const sec = c?.secs.find(x => x.id === sid);
    if (!sec) return;
    sec.slots.forEach(slot => out.push({ ...slot, cid, sid, prof: sec.prof, color: C[c.ci] }));
  });
  return out;
}

function getConflicts(slots) {
  const set = new Set();
  for (let i = 0; i < slots.length; i++) {
    for (let j = i + 1; j < slots.length; j++) {
      const a = slots[i], b = slots[j];
      if (a.d === b.d && a.s < b.e && b.s < a.e) { set.add(a.cid); set.add(b.cid); }
    }
  }
  return set;
}

// ─── RENDER ──────────────────────────────────────────────
function renderTabs() {
  const area = document.getElementById('tabs-area');
  const tabs = state.schedules.map(sched => {
    const isActive = sched.id === state.active;
    const count = Object.values(sched.sel || {}).filter(v => v).length;
    return `<div class="tab${isActive ? ' active' : ''}" onclick="switchSchedule('${sched.id}')">
      <span>${esc(sched.name)}</span>
      ${count > 0 ? `<span class="tab-badge">${count}/7</span>` : ''}
      ${isActive ? `<span class="tab-edit" onclick="event.stopPropagation();renameSchedule('${sched.id}')" title="Rename">✎</span>` : ''}
      ${state.schedules.length > 1 ? `<span class="tab-del" onclick="event.stopPropagation();deleteSchedule('${sched.id}')" title="Delete">×</span>` : ''}
    </div>`;
  }).join('');
  area.innerHTML = tabs + `<button class="btn-new" onclick="addSchedule()">+ New Schedule</button>`;
}

function renderStats(sel, conflicts) {
  const added = Object.entries(sel).filter(([, v]) => v).map(([k]) => k);
  const cr = added.reduce((a, cid) => a + (courses.find(c => c.id === cid)?.cr || 0), 0);
  const nc = conflicts.size;
  document.getElementById('s-cr').textContent = cr;
  document.getElementById('s-cnt').textContent = `${added.length} / 7`;
  const ce = document.getElementById('s-conf');
  ce.textContent = nc ? `${nc} course${nc > 1 ? 's' : ''}` : 'none';
  ce.style.color = nc ? '#c0392b' : '#22a06b';
}

function renderCards(sel) {
  const g = document.getElementById('cgrid');
  g.innerHTML = '';
  courses.forEach(course => {
    const c = C[course.ci], cur = sel[course.id];
    const btns = course.secs.map(sec => {
      const on = cur === sec.id, af = sec.en >= sec.cap - 2;
      const days = [...new Set(sec.slots.map(s => s.d))].join(' · ');
      const timeStr = `${fmt(sec.slots[0].s)} – ${fmt(sec.slots[0].e)}`;
      return `<button class="sbtn" onclick="pick('${course.id}','${sec.id}')"
        style="border:${on ? `1.5px solid ${c.bd}` : '1px solid #e5e5e5'};background:${on ? c.bg : 'transparent'};">
        <div style="flex:1;min-width:0;">
          <div style="font-size:12px;font-weight:600;color:${on ? c.tx : '#1a1a1a'};">Sec ${sec.id}</div>
          <div style="font-size:10px;color:#999;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${days} · ${timeStr}</div>
          <div style="font-size:10px;color:${on ? c.tx : '#aaa'};opacity:0.85;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">👤 ${esc(sec.prof)}</div>
        </div>
        <div style="font-size:11px;color:${af ? '#c0392b' : '#999'};font-weight:${af ? '600' : '400'};flex-shrink:0;margin-left:6px;">
          ${sec.en}/${sec.cap}${af ? ' ⚠' : ''}
        </div>
      </button>`;
    }).join('');
    const el = document.createElement('div');
    el.className = 'ccard';
    el.style.border = cur ? `1.5px solid ${c.bd}` : '1px solid #e5e5e5';
    el.innerHTML = `
      <span class="pill" style="background:${c.bg};color:${c.tx};">${course.type} · ${course.cr} unit${course.cr > 1 ? 's' : ''}</span>
      <div style="font-size:13px;font-weight:600;margin-bottom:2px;">${course.code}</div>
      <div style="font-size:11px;color:#888;margin-bottom:8px;">${course.name}</div>
      ${btns}`;
    g.appendChild(el);
  });
}

function renderCal(sel) {
  const slots = getSlots(sel);
  const conflicts = getConflicts(slots);

  document.getElementById('calhdr').innerHTML =
    `<div style="width:46px;flex-shrink:0;"></div>` +
    DLBL.map(d => `<div style="flex:1;text-align:center;padding:7px 2px;font-size:11px;font-weight:600;color:#888;">${d}</div>`).join('');

  const ta = document.getElementById('taxs');
  ta.style.cssText = `width:46px;flex-shrink:0;position:relative;height:${H}px;`;
  let th = '';
  for (let m = START; m <= END; m += 60) {
    th += `<div style="position:absolute;top:${(m-START)*PPM}px;left:0;right:4px;font-size:10px;color:#bbb;text-align:right;transform:translateY(-50%);white-space:nowrap;line-height:1;">${fmt(m)}</div>`;
  }
  ta.innerHTML = th;

  const cb = document.getElementById('calb');
  cb.style.cssText = `flex:1;display:flex;position:relative;height:${H}px;`;

  let hlHtml = '';
  for (let m = START; m <= END; m += 60) {
    hlHtml += `<div style="position:absolute;top:${(m-START)*PPM}px;left:0;right:0;border-top:1px solid #f0f0ee;pointer-events:none;z-index:0;"></div>`;
  }

  const cols = DAYS.map((day, di) => {
    const ds = slots.filter(s => s.d === day);
    const slotsHtml = ds.map(slot => {
      const top = (slot.s - START) * PPM, ht = (slot.e - slot.s) * PPM;
      const course = courses.find(c => c.id === slot.cid);
      const isC = conflicts.has(slot.cid), col = slot.color;
      // Always show prof — parent overflow:hidden clips it on tiny blocks
      const profLine = `<div style="font-size:8.5px;color:${isC ? '#c0392b' : col.tx};opacity:0.75;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px;">👤 ${esc(slot.prof)}</div>`;
      return `<div style="position:absolute;left:2px;right:2px;top:${top}px;height:${ht}px;
        background:${col.bg};border:${isC ? '1.5px solid #e74c3c' : `1px solid ${col.bd}`};
        border-radius:5px;overflow:hidden;padding:3px 5px;z-index:2;box-sizing:border-box;">
        <div style="font-size:10px;font-weight:600;color:${isC ? '#c0392b' : col.tx};line-height:1.3;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;">${course.code}</div>
        ${ht > 28 ? `<div style="font-size:9px;color:${col.tx};opacity:0.8;white-space:nowrap;overflow:hidden;">${fmt(slot.s)}–${fmt(slot.e)}</div>` : ''}
        ${profLine}
        ${isC ? `<div style="position:absolute;top:3px;right:3px;width:5px;height:5px;border-radius:50%;background:#e74c3c;"></div>` : ''}
      </div>`;
    }).join('');
    return `<div style="flex:1;position:relative;${di > 0 ? 'border-left:1px solid #f0f0ee;' : ''}">${slotsHtml}</div>`;
  }).join('');

  cb.innerHTML = `<div style="position:absolute;inset:0;pointer-events:none;">${hlHtml}</div>${cols}`;
  return conflicts;
}

function renderSidebar(sel) {
  const body = document.getElementById('sel-list-body');
  const entries = Object.entries(sel).filter(([, v]) => v);
  if (!entries.length) {
    body.innerHTML = `<span style="color:#ccc;font-size:11px;">Nothing selected yet.</span>`;
    return;
  }
  body.innerHTML = entries.map(([cid, sid]) => {
    const course = courses.find(c => c.id === cid);
    const sec = course?.secs.find(s => s.id === sid);
    if (!course || !sec) return '';
    const col = C[course.ci];
    // Group slots by time (show unique day combos)
    const days = [...new Set(sec.slots.map(s => s.d))].join('/');
    const timeStr = `${fmt(sec.slots[0].s)} – ${fmt(sec.slots[0].e)}`;
    return `<div style="padding:6px 8px;margin-bottom:5px;border-radius:7px;background:${col.bg};border:1px solid ${col.bd};font-size:11px;color:${col.tx};font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">
      ${course.code} – ${sec.id} – ${timeStr}
    </div>`;
  }).join('');
}


function render() {
  const sel = getActiveSel();
  renderTabs();
  const conflicts = renderCal(sel);
  renderStats(sel, conflicts);
  renderCards(sel);
  renderSidebar(sel);
}

// ─── ACTIONS ─────────────────────────────────────────────
window.pick = function(cid, sid) {
  const sched = getActiveSched();
  if (!sched.sel) sched.sel = {};
  if (sched.sel[cid] === sid) delete sched.sel[cid];
  else sched.sel[cid] = sid;
  saveState();
  render();
};

window.addSchedule = function() {
  const id = 'sched-' + Date.now();
  state.schedules.push({ id, name: `Schedule ${state.schedules.length + 1}`, sel: {} });
  state.active = id;
  saveState();
  render();
};

window.switchSchedule = function(id) {
  state.active = id;
  saveState();
  render();
};

window.deleteSchedule = function(id) {
  if (state.schedules.length <= 1) return;
  const name = state.schedules.find(s => s.id === id)?.name || 'this schedule';
  if (!confirm(`Delete "${name}"? This cannot be undone.`)) return;
  state.schedules = state.schedules.filter(s => s.id !== id);
  if (state.active === id) state.active = state.schedules[0].id;
  saveState();
  render();
};

window.renameSchedule = function(id) {
  const sched = state.schedules.find(s => s.id === id);
  if (!sched) return;
  const name = prompt('Rename schedule to:', sched.name);
  if (name && name.trim()) {
    sched.name = name.trim();
    saveState();
    render();
  }
};

// ─── INIT ────────────────────────────────────────────────
loadState();
render();
</script>
</body>
</html>
