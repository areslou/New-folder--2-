<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Schedule Maker — AY 2025-2026 Term 3</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, -apple-system, sans-serif; background: #f5f5f3; color: #1a1a1a; min-height: 100vh; padding: 1.5rem; }
  h1 { font-size: 18px; font-weight: 600; margin-bottom: 4px; }
  .subtitle { font-size: 13px; color: #666; margin-bottom: 1.5rem; }
  .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 1.25rem; }
  .stat-card { background: #fff; border: 1px solid #e5e5e5; border-radius: 10px; padding: 12px 1rem; text-align: center; }
  .stat-label { font-size: 12px; color: #888; margin-bottom: 3px; }
  .stat-val { font-size: 22px; font-weight: 600; }
  .course-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 1.25rem; }
  .ccard { background: #fff; border-radius: 10px; padding: 12px; transition: border-color 0.15s; }
  .pill { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 4px; margin-bottom: 6px; }
  .sbtn { display: flex; align-items: center; justify-content: space-between; padding: 6px 8px; margin-bottom: 4px; cursor: pointer; border-radius: 6px; transition: background 0.1s, border 0.1s; font-family: inherit; width: 100%; background: transparent; text-align: left; }
  .sbtn:hover { background: #f5f5f3; }
  .cal-wrap { background: #fff; border: 1px solid #e5e5e5; border-radius: 10px; overflow: hidden; }
  .cal-hdr { display: flex; background: #fafaf8; border-bottom: 1px solid #e5e5e5; }
  .cal-body { display: flex; }
  .hint { margin-top: 8px; font-size: 11px; color: #999; }
  @media (max-width: 600px) {
    .course-grid { grid-template-columns: 1fr; }
    .stats { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<h1>Schedule Maker</h1>
<p class="subtitle">AY 2025-2026 · Term 3 · Manila Campus</p>

<div class="stats">
  <div class="stat-card"><p class="stat-label">total units</p><p class="stat-val" id="s-cr">0</p></div>
  <div class="stat-card"><p class="stat-label">courses added</p><p class="stat-val" id="s-cnt">0 / 7</p></div>
  <div class="stat-card"><p class="stat-label">conflicts</p><p class="stat-val" id="s-conf" style="color:#22a06b;">none</p></div>
</div>

<div class="course-grid" id="cgrid"></div>

<div class="cal-wrap">
  <div class="cal-hdr" id="calhdr"></div>
  <div class="cal-body">
    <div id="taxs" style="width:46px;flex-shrink:0;position:relative;"></div>
    <div id="calb" style="flex:1;display:flex;position:relative;"></div>
  </div>
</div>

<p class="hint">Click a section to add it to your schedule · Click again to remove · Red outline = time conflict · ⚠ = almost full</p>

<script>
const DAYS = ['MON','TUE','WED','THU','FRI','SAT','SUN'];
const DLBL = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
const START = 420, END = 1305, PPM = 0.6;
const H = (END - START) * PPM;

function fmt(m) {
  const h = Math.floor(m / 60), mn = m % 60;
  const ap = h >= 12 ? 'PM' : 'AM';
  const hh = h > 12 ? h - 12 : h === 0 ? 12 : h;
  return `${hh}:${mn.toString().padStart(2,'0')} ${ap}`;
}

const C = [
  { bg:'#E6F1FB', tx:'#185FA5', bd:'#378ADD' }, // blue
  { bg:'#E1F5EE', tx:'#0F6E56', bd:'#1D9E75' }, // teal
  { bg:'#FAEEDA', tx:'#854F0B', bd:'#BA7517' }, // amber
  { bg:'#EAF3DE', tx:'#3B6D11', bd:'#639922' }, // green
  { bg:'#EEEDFE', tx:'#534AB7', bd:'#7F77DD' }, // purple
  { bg:'#FAECE7', tx:'#993C1D', bd:'#D85A30' }, // coral
  { bg:'#FBEAF0', tx:'#993556', bd:'#D4537E' }, // pink
];

const courses = [
  {
    id:'cpecog1', code:'CPECOG1', name:'CPE Elective 1 Lecture', type:'Lecture', cr:2, ci:0,
    secs:[
      { id:'E21', slots:[{d:'TUE',s:870,e:930},{d:'FRI',s:870,e:930}], en:4,  cap:22 },
      { id:'E22', slots:[{d:'TUE',s:450,e:510},{d:'FRI',s:450,e:510}], en:2,  cap:22 },
      { id:'E20', slots:[{d:'TUE',s:555,e:615},{d:'FRI',s:555,e:615}], en:21, cap:22 },
    ]
  },
  {
    id:'dsigpro', code:'DSIGPRO', name:'Digital Signal Processing', type:'Lecture', cr:3, ci:1,
    secs:[
      { id:'E32', slots:[{d:'MON',s:870,e:960},{d:'THU',s:870,e:960}],   en:13, cap:30 },
      { id:'E31', slots:[{d:'MON',s:975,e:1065},{d:'THU',s:975,e:1065}], en:7,  cap:30 },
      { id:'E30', slots:[{d:'MON',s:660,e:750},{d:'THU',s:660,e:750}],   en:14, cap:30 },
    ]
  },
  {
    id:'ochesaf', code:'OCHESAF', name:'Basic Occ. Health & Safety', type:'Lecture', cr:3, ci:2,
    secs:[
      { id:'E21', slots:[{d:'MON',s:870,e:960},{d:'THU',s:870,e:960}],   en:6,  cap:22 },
      { id:'E20', slots:[{d:'MON',s:555,e:645},{d:'THU',s:555,e:645}],   en:7,  cap:22 },
      { id:'E22', slots:[{d:'MON',s:765,e:855},{d:'THU',s:765,e:855}],   en:16, cap:22 },
    ]
  },
  {
    id:'lbycpf3', code:'LBYCPF3', name:'CPE Elective 1 Laboratory', type:'Lab', cr:1, ci:3,
    secs:[
      { id:'E25', slots:[{d:'MON',s:870,e:1050}], en:12, cap:25 },
      { id:'E26', slots:[{d:'MON',s:570,e:750}],  en:4,  cap:25 },
      { id:'E27', slots:[{d:'WED',s:570,e:750}],  en:10, cap:25 },
    ]
  },
  {
    id:'cpeprac', code:'CPEPRAC', name:'CPE Laws & Professional Practice', type:'Lecture', cr:2, ci:4,
    secs:[
      { id:'E22', slots:[{d:'TUE',s:870,e:930},{d:'FRI',s:870,e:930}],   en:11, cap:22 },
      { id:'E20', slots:[{d:'TUE',s:660,e:720},{d:'FRI',s:660,e:720}],   en:7,  cap:22 },
      { id:'E21', slots:[{d:'TUE',s:765,e:825},{d:'FRI',s:765,e:825}],   en:10, cap:22 },
    ]
  },
  {
    id:'lbycpa4', code:'LBYCPA4', name:'DSP Laboratory', type:'Lab', cr:1, ci:5,
    secs:[
      { id:'E25', slots:[{d:'TUE',s:870,e:1050}], en:17, cap:25 },
      { id:'E26', slots:[{d:'TUE',s:450,e:630}],  en:10, cap:25 },
      { id:'E27', slots:[{d:'TUE',s:660,e:840}],  en:10, cap:25 },
    ]
  },
  {
    id:'thscp4a', code:'THSCP4A', name:'CPE Practice and Design 1', type:'Capstone', cr:1, ci:6,
    secs:[
      { id:'E40', slots:[{d:'SAT',s:1080,e:1275}], en:24, cap:40 },
      { id:'E41', slots:[{d:'SUN',s:600,e:630}],   en:2,  cap:40 },
    ]
  },
];

const sel = {};

function getSlots() {
  const out = [];
  Object.entries(sel).forEach(([cid, sid]) => {
    if (!sid) return;
    const c = courses.find(x => x.id === cid);
    const sec = c.secs.find(x => x.id === sid);
    if (!sec) return;
    sec.slots.forEach(slot => out.push({ ...slot, cid, color: C[c.ci] }));
  });
  return out;
}

function getConflicts(slots) {
  const set = new Set();
  for (let i = 0; i < slots.length; i++) {
    for (let j = i + 1; j < slots.length; j++) {
      const a = slots[i], b = slots[j];
      if (a.d === b.d && a.s < b.e && b.s < a.e) {
        set.add(a.cid);
        set.add(b.cid);
      }
    }
  }
  return set;
}

function renderCards() {
  const g = document.getElementById('cgrid');
  g.innerHTML = '';
  courses.forEach(course => {
    const c = C[course.ci], cur = sel[course.id];
    const btns = course.secs.map(sec => {
      const on = cur === sec.id, af = sec.en >= sec.cap - 2;
      const days = [...new Set(sec.slots.map(s => s.d))].join(' · ');
      return `<button class="sbtn" onclick="pick('${course.id}','${sec.id}')"
        style="border:${on ? `1.5px solid ${c.bd}` : '1px solid #e5e5e5'};background:${on ? c.bg : 'transparent'};">
        <div>
          <div style="font-size:12px;font-weight:600;color:${on ? c.tx : '#1a1a1a'};">Sec ${sec.id}</div>
          <div style="font-size:10px;color:#888;">${days}</div>
        </div>
        <div style="font-size:11px;color:${af ? '#c0392b' : '#888'};font-weight:${af?'600':'400'};">
          ${sec.en}/${sec.cap}${af ? ' ⚠' : ''}
        </div>
      </button>`;
    }).join('');

    const el = document.createElement('div');
    el.className = 'ccard';
    el.style.border = cur ? `1.5px solid ${c.bd}` : '1px solid #e5e5e5';
    el.innerHTML = `
      <span class="pill" style="background:${c.bg};color:${c.tx};">${course.type} · ${course.cr} unit${course.cr > 1 ? 's' : ''}</span>
      <div style="font-size:13px;font-weight:600;margin-bottom:2px;">${course.code}</div>
      <div style="font-size:11px;color:#888;margin-bottom:8px;">${course.name}</div>
      ${btns}`;
    g.appendChild(el);
  });
}

function renderCal() {
  // Header
  document.getElementById('calhdr').innerHTML =
    `<div style="width:46px;flex-shrink:0;"></div>` +
    DLBL.map(d => `<div style="flex:1;text-align:center;padding:7px 2px;font-size:11px;font-weight:600;color:#888;">${d}</div>`).join('');

  // Time axis
  const ta = document.getElementById('taxs');
  ta.style.cssText = `width:46px;flex-shrink:0;position:relative;height:${H}px;`;
  let th = '';
  for (let m = START; m <= END; m += 60) {
    const top = (m - START) * PPM;
    th += `<div style="position:absolute;top:${top}px;left:0;right:4px;font-size:10px;color:#aaa;text-align:right;transform:translateY(-50%);line-height:1;white-space:nowrap;">${fmt(m)}</div>`;
  }
  ta.innerHTML = th;

  // Calendar body
  const cb = document.getElementById('calb');
  cb.style.cssText = `flex:1;display:flex;position:relative;height:${H}px;`;

  const slots = getSlots();
  const conflicts = getConflicts(slots);

  // Hour lines
  let hlHtml = '';
  for (let m = START; m <= END; m += 60) {
    const top = (m - START) * PPM;
    hlHtml += `<div style="position:absolute;top:${top}px;left:0;right:0;border-top:1px solid #f0f0ee;pointer-events:none;z-index:0;"></div>`;
  }

  // Day columns
  const cols = DAYS.map((day, di) => {
    const ds = slots.filter(s => s.d === day);
    const slotsHtml = ds.map(slot => {
      const top = (slot.s - START) * PPM;
      const ht = (slot.e - slot.s) * PPM;
      const course = courses.find(c => c.id === slot.cid);
      const isC = conflicts.has(slot.cid);
      const col = slot.color;
      return `<div style="position:absolute;left:2px;right:2px;top:${top}px;height:${ht}px;
        background:${col.bg};border:${isC ? `1.5px solid #e74c3c` : `1px solid ${col.bd}`};
        border-radius:5px;overflow:hidden;padding:3px 5px;z-index:2;box-sizing:border-box;">
        <div style="font-size:10px;font-weight:600;color:${isC ? '#c0392b' : col.tx};line-height:1.3;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;">${course.code}</div>
        ${ht > 28 ? `<div style="font-size:9px;color:${col.tx};opacity:0.8;white-space:nowrap;overflow:hidden;">${fmt(slot.s)}–${fmt(slot.e)}</div>` : ''}
        ${isC ? `<div style="position:absolute;top:3px;right:3px;width:5px;height:5px;border-radius:50%;background:#e74c3c;"></div>` : ''}
      </div>`;
    }).join('');
    return `<div style="flex:1;position:relative;${di > 0 ? 'border-left:1px solid #f0f0ee;' : ''}">${slotsHtml}</div>`;
  }).join('');

  cb.innerHTML = `<div style="position:absolute;inset:0;pointer-events:none;">${hlHtml}</div>${cols}`;

  // Stats
  const added = Object.entries(sel).filter(([k, v]) => v).map(([k]) => k);
  const cr = added.reduce((a, cid) => a + courses.find(c => c.id === cid).cr, 0);
  document.getElementById('s-cr').textContent = cr;
  document.getElementById('s-cnt').textContent = `${added.length} / 7`;
  const nc = conflicts.size;
  const ce = document.getElementById('s-conf');
  ce.textContent = nc ? `${nc} course${nc > 1 ? 's' : ''}` : 'none';
  ce.style.color = nc ? '#c0392b' : '#22a06b';
}

window.pick = function(cid, sid) {
  sel[cid] === sid ? delete sel[cid] : sel[cid] = sid;
  renderCards();
  renderCal();
};

renderCards();
renderCal();
</script>
</body>
</html>
